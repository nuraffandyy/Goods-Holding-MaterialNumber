<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Warehouse Locator Admin</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="css/style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

</head>

<body>

<div class="container mt-5">

<div class="hero-card">

<h2>

📦 Warehouse Locator Admin

</h2>

<p>

Upload file Excel SAP untuk membuat data.json

</p>

<input

type="file"

id="excelFile"

accept=".xlsx,.xls"

class="form-control">

<button

class="btn btn-primary mt-3"

id="convertBtn">

Convert Excel

</button>

<button

class="btn btn-success mt-3"

id="downloadBtn">

Download data.json

</button>

</div>

</div>

<script src="js/admin.js"></script>

</body>

</html>
