<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Warehouse Material Locator</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<header class="header">

    <div class="header-title">

        Warehouse Material Locator

    </div>

</header>

<main class="container">

    <section class="search-panel">

        <h2>Search Material</h2>

        <div class="search-row">

            <input
                type="text"
                id="searchInput"
                placeholder="Material Number / Description / Storage Bin">

            <button id="searchBtn">

                Search

            </button>

            <button id="clearBtn">

                Clear

            </button>

        </div>

        <div class="filter-row">

            <label>

                Storage Type

            </label>

            <select id="storageFilter">

                <option value="">All</option>

            </select>

        </div>

    </section>

    <section class="result-panel">

        <div class="panel-header">

            Search Result

        </div>

        <div id="resultContainer">

            <div class="empty-message">

                Enter a Material Number then press Search.

            <table id="resultTable">

                <thead>

                    <tr>

                        <th>Material</th>

                        <th>Description</th>

                        <th>Storage Type</th>

                        <th>Storage Bin</th>

                        <th>Qty</th>

                        <th>UoM</th>

                        <th>Action</th>

                    </tr>

                </thead>

                <tbody id="resultBody">

                </tbody>

            </table>

        </div>

    </section>

</main>

<footer>

    Warehouse Material Locator © 2026

</footer>

<script src="js/app.js"></script>

<script src="js/search.js"></script>

</body>

</html>
