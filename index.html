<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Warehouse Locator v2.0</title>

<link rel="manifest" href="manifest.json">

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="css/style.css">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<nav class="navbar navbar-dark bg-primary shadow">

<div class="container">

<span class="navbar-brand fw-bold">

📦 Warehouse Locator

</span>

<button
class="btn btn-light btn-sm"
id="darkModeBtn">

🌙

</button>

</div>

</nav>

<div class="container mt-4">

<div class="row">

<div class="col-lg-12">

<div class="hero-card">

<h2>

Warehouse Stock Locator

</h2>

<p>

Cari Material Number dengan cepat

</p>

<div class="search-area">

<input
type="text"
id="searchInput"
class="form-control form-control-lg"

placeholder="Cari Material Number / Description / Storage Bin">

</div>

<div
id="autocomplete"
class="autocomplete-box">

</div>

</div>

</div>

</div>

<div class="row mt-4">

<div class="col-md-4">

<div class="dashboard-card">

<div class="icon">

📦

</div>

<div>

<h6>

Total Material

</h6>

<h2 id="totalMaterial">

0

</h2>

</div>

</div>

</div>

<div class="col-md-4">

<div class="dashboard-card">

<div class="icon">

📍

</div>

<div>

<h6>

Storage Bin

</h6>

<h2 id="totalBin">

0

</h2>

</div>

</div>

</div>

<div class="col-md-4">

<div class="dashboard-card">

<div class="icon">

📅

</div>

<div>

<h6>

Last Update

</h6>

<h5 id="lastUpdate">

-

</h5>

</div>

</div>

</div>

</div>

<div class="row mt-4">

<div class="col-lg-12">

<div class="filter-card">

<div class="row">

<div class="col-md-4">

<select
id="storageFilter"
class="form-select">

<option value="">

Semua Storage Type

</option>

</select>

</div>

<div class="col-md-4">

<select
id="qtyFilter"
class="form-select">

<option value="">

Semua Quantity

</option>

<option value="available">

Quantity > 0

</option>

<option value="zero">

Quantity = 0

</option>

</select>

</div>

<div class="col-md-4">

<button
class="btn btn-success w-100"
id="scanBtn">

<i class="fa-solid fa-barcode"></i>

Scan Barcode

</button>

</div>

</div>

</div>

</div>

</div>

<div class="row mt-4">

<div class="col-lg-12">

<h4>

Hasil Pencarian

</h4>

<div
id="resultContainer">

<div class="empty-card">

<i class="fa-solid fa-box-open fa-3x"></i>

<h5 class="mt-3">

Silakan cari Material Number

</h5>

</div>

  </div>

</div>

</div>

</div>

<footer class="mt-5 mb-4">

<div class="text-center text-secondary">

<hr>

<p>

Warehouse Locator v2.0 © 2026

</p>

</div>

</footer>

<!-- Modal Detail Material -->

<div
class="modal fade"
id="detailModal"
tabindex="-1">

<div class="modal-dialog modal-lg">

<div class="modal-content">

<div class="modal-header">

<h5 class="modal-title">

📦 Detail Material

</h5>

<button
type="button"
class="btn-close"
data-bs-dismiss="modal">

</button>

</div>

<div
class="modal-body"
id="modalContent">

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/search.js"></script>

<script src="js/app.js"></script>

<script>

if('serviceWorker' in navigator){

window.addEventListener('load',()=>{

navigator.serviceWorker.register('service-worker.js');

});

}

</script>

</body>

</html>
