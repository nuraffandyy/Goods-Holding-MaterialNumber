<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse Stock Locator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-primary text-center">
            Warehouse Stock Locator
        </h2>

        <input
            type="text"
            id="product"
            class="form-control mt-3"
            placeholder="Masukkan Stock Code">

        <button
            class="btn btn-primary mt-3 w-100"
            onclick="searchMaterial()">

            Search

        </button>

        <hr>

        <div id="result"></div>

    </div>

</div>

<script>

function searchMaterial(){

let product=document.getElementById("product").value;

fetch("/search?product="+product)

.then(response=>response.json())

.then(data=>{

let html="";

if(data.length==0){

html="<div class='alert alert-danger'>Material tidak ditemukan</div>";

}else{

data.forEach(item=>{

html+=`
<div class="card mt-3">

<div class="card-body">

<h5>${item.Product}</h5>

<p>${item["Product Description"]}</p>

<b>Storage Bin :</b>

${item["Storage Bin"]}<br>

<b>Quantity :</b>

${item.Quantity}

</div>

</div>
`;

});

}

document.getElementById("result").innerHTML=html;

});

}

</script>

</body>
</html>
