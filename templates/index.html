<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse Stock Locator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
        }

        .header{
            background:#0d6efd;
            color:white;
            padding:20px;
            border-radius:10px;
            margin-bottom:20px;
        }

        .card-result{
            border-left:6px solid #0d6efd;
            margin-top:15px;
        }

        .storage{
            font-size:22px;
            font-weight:bold;
            color:#198754;
        }
    </style>

</head>

<body>

<div class="container mt-4">

    <div class="header">

        <h2>Warehouse Stock Locator</h2>

        <p class="mb-0">
            Search Material Storage Bin
        </p>

    </div>

    <div class="card shadow">

        <div class="card-body">

            <label class="form-label">

                Stock Code

            </label>

            <input
                type="text"
                id="product"
                class="form-control"
                placeholder="Contoh : 70012345">

            <button
                class="btn btn-primary mt-3 w-100"
                onclick="searchMaterial()">

                Search

            </button>

        </div>

    </div>

    <div id="result"></div>

</div>

<script>

function searchMaterial(){

    let product=document.getElementById("product").value.trim();

    if(product==""){

        alert("Masukkan Stock Code");

        return;

    }

    fetch("/search?product="+encodeURIComponent(product))

    .then(response=>response.json())

    .then(data=>{

        let html="";

        if(data.length===0){

            html=`
            <div class="alert alert-danger mt-3">
                Material tidak ditemukan.
            </div>
            `;

        }

        else{

            data.forEach(function(item){

                html+=`

                <div class="card shadow card-result">

                    <div class="card-body">

                        <h5 class="text-primary">

                            ${item["Product"] || ""}

                        </h5>

                        <hr>

                        <p>

                            <strong>Description</strong><br>

                            ${item["Product Description"] || ""}

                        </p>

                        <p>

                            <strong>Storage Bin</strong><br>

                            <span class="storage">

                            ${item["Storage Bin"] || ""}

                            </span>

                        </p>

                        <p>

                            <strong>Quantity</strong><br>

                            ${item["Quantity"] || ""}

                        </p>

                        <p>

                            <strong>Goods Receipt Date</strong><br>

                            ${item["Goods Receipt Date"] || ""}

                        </p>

                        <button
                            class="btn btn-success"
                            onclick="copyBin('${item["Storage Bin"] || ""}')">

                            Copy Storage Bin

                        </button>

                    </div>

                </div>

                `;

            });

        }

        document.getElementById("result").innerHTML=html;

    });

}

function copyBin(bin){

    navigator.clipboard.writeText(bin);

    alert("Storage Bin berhasil disalin : "+bin);

}

</script>

</body>
</html>
